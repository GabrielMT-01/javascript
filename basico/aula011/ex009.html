<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Qual país você vive?</title>
    </head>
    <body>
        <h1>Escolha seu país abaixo e direi se você é estrangeiro ou não</h1>
        <input type="text" name="txtpais" id="txtpais">
        <input type="button" value="Verificar" onclick="verificar()">
        <div id="res">
            
        </div>
        
        
        <script>
        function verificar(){
            var txtp = document.getElementById('txtpais')
            
            var res = document.getElementById('res')
            var real = txtp.value;
            if (real == 'Brasil'){
                res.innerHTML = ' <h2>Você é BRASILEIIIIIIIROOOOO</h2>'
            } else{
                res.innerHTML = '<p>Você é estrangeiro</p>'
            }
        }

    </script>
</body>
